name: EvalView

on:
  push:
  pull_request:

jobs:
  regression-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install evalview

      - name: Start agent
        run: |
          nohup uvicorn agent.app:app --host 127.0.0.1 --port 8000 >/tmp/support-agent.log 2>&1 &
          sleep 3

      - name: Run EvalView regression check
        run: evalview check tests
